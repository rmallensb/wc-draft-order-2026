name: Sync World Cup results

on:
  schedule:
    # Every 15 minutes. Offset off the top-of-hour to reduce the chance of
    # GitHub queueing/delaying us along with everyone else.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Don't let two scheduled runs race each other on push.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python sync.py

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- data/; then
            echo "No changes to data/ — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json data/results.js
          git commit -m "sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
